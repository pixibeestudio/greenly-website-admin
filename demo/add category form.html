<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greenly Add Category Form</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Quicksand', 'sans-serif'],
                    },
                    colors: {
                        forest: {
                            50: '#e8f5e9',
                            100: '#c8e6c9',
                            500: '#4caf50',
                            600: '#43a047',
                            700: '#2e7d32', 
                            800: '#1b5e20',
                            900: '#0d3b10',
                        },
                        organic: {
                            100: '#fff9c4',
                            400: '#fbc02d',
                            500: '#f9a825', 
                        },
                        cream: {
                            50: '#fffde7', 
                            100: '#f5f5f5',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-white font-sans antialiased text-gray-800 p-10 min-h-screen relative overflow-x-hidden">

    <!-- Giả lập Main Content Container -->
    <div class="max-w-[1200px] mx-auto bg-cream-50 p-6 md:p-10 rounded-2xl border border-dashed border-gray-300 relative">
        <div class="absolute -top-3 left-6 bg-white px-3 py-0.5 rounded-full text-xs text-gray-400 font-mono shadow-sm">Add Category Form</div>

        <!-- Header -->
        <div class="mb-8">
            <h2 class="text-2xl font-bold text-forest-800 flex items-center gap-2">
                <button class="w-8 h-8 rounded-full bg-white border border-gray-200 flex items-center justify-center text-gray-500 hover:text-forest-700 hover:bg-forest-50 transition-colors mr-2">
                    <i class="fa-solid fa-arrow-left text-sm"></i>
                </button>
                Thêm danh mục mới
            </h2>
            <p class="text-gray-500 text-sm mt-1 ml-11">Nhập thông tin chi tiết để tạo danh mục sản phẩm mới cho cửa hàng.</p>
        </div>

        <!-- FORM CARD (Giống wireframe) -->
        <div class="bg-white max-w-4xl mx-auto rounded-3xl shadow-lg shadow-gray-200/50 border border-gray-100 p-8 md:p-10">
            
            <div class="flex flex-col md:flex-row gap-10">
                
                <!-- Cột trái: Khu vực hình ảnh -->
                <div class="w-full md:w-1/3 flex flex-col items-center">
                    <div class="w-full text-left mb-2">
                        <label class="block text-sm font-bold text-gray-700">Hình ảnh danh mục</label>
                    </div>
                    
                    <!-- Khung Upload/Preview Image -->
                    <div class="w-full aspect-square bg-gray-50 rounded-2xl border-2 border-dashed border-gray-300 flex flex-col items-center justify-center relative overflow-hidden group cursor-pointer hover:border-forest-500 hover:bg-forest-50 transition-colors">
                        
                        <!-- Dữ liệu mẫu: Hình ảnh đã được chọn -->
                        <img src="https://images.unsplash.com/photo-1540420773420-3366772f4999?auto=format&fit=crop&w=400&q=80" alt="Preview" class="absolute inset-0 w-full h-full object-cover z-0">
                        
                        <!-- Lớp phủ khi hover (nếu muốn đổi ảnh) -->
                        <div class="absolute inset-0 bg-black/40 flex flex-col items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity z-10">
                            <i class="fa-solid fa-cloud-arrow-up text-3xl text-white mb-2"></i>
                            <span class="text-white text-sm font-medium">Tải ảnh khác</span>
                        </div>
                    </div>

                    <!-- Text hướng dẫn -->
                    <p class="text-xs text-gray-400 mt-4 font-medium">PNG, JPG. Tối đa 5MB</p>

                    <!-- Nút Đổi hình ảnh -->
                    <button type="button" class="mt-4 w-full bg-white border-2 border-gray-200 text-gray-700 hover:border-forest-500 hover:text-forest-700 font-bold py-2.5 px-4 rounded-xl transition-all shadow-sm flex items-center justify-center gap-2">
                        <i class="fa-solid fa-image text-sm"></i>
                        Đổi hình ảnh
                    </button>
                </div>

                <!-- Cột phải: Khung nhập liệu (Inputs) -->
                <div class="w-full md:w-2/3 flex flex-col justify-between">
                    
                    <div class="space-y-6">
                        <!-- Input: Tên danh mục -->
                        <div>
                            <label for="categoryName" class="block text-sm font-bold text-gray-700 mb-2">Tên danh mục <span class="text-red-500">*</span></label>
                            <input type="text" id="categoryName" value="Rau Củ Hữu Cơ" class="w-full bg-white border border-gray-300 text-gray-800 text-base rounded-xl focus:ring-2 focus:ring-forest-500 focus:border-forest-500 block px-4 py-3 outline-none transition-all shadow-sm" placeholder="Nhập tên danh mục...">
                        </div>

                        <!-- Textarea: Mô tả -->
                        <div>
                            <div class="flex justify-between items-end mb-2">
                                <label for="categoryDesc" class="block text-sm font-bold text-gray-700">Mô tả</label>
                            </div>
                            <div class="relative">
                                <textarea id="categoryDesc" rows="5" class="w-full bg-white border border-gray-300 text-gray-800 text-base rounded-xl focus:ring-2 focus:ring-forest-500 focus:border-forest-500 block px-4 py-3 outline-none transition-all shadow-sm resize-none" placeholder="Nhập mô tả cho danh mục này... (Tùy chọn)" oninput="updateCharCount(this)"></textarea>
                                
                                <!-- Dữ liệu mẫu chèn bằng JS khi load để trigger bộ đếm -->
                                
                                <!-- Character Count (Nằm góc dưới bên phải) -->
                                <div class="absolute bottom-3 right-4 text-xs font-medium text-gray-400 bg-white px-1">
                                    <span id="charCount">0</span>/500
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Buttons: Hủy & Thêm -->
                    <div class="flex justify-end items-center gap-4 mt-8 pt-6 border-t border-gray-100">
                        <button type="button" class="px-6 py-3 bg-white text-gray-600 font-bold rounded-xl hover:bg-gray-100 transition-colors">
                            Hủy
                        </button>
                        <button type="button" onclick="showNotification()" class="px-8 py-3 bg-forest-700 text-white font-bold rounded-xl hover:bg-forest-800 shadow-lg shadow-forest-500/30 transition-all flex items-center gap-2">
                            Thêm danh mục
                        </button>
                    </div>

                </div>
            </div>

        </div>
    </div>

    <!-- TOAST NOTIFICATION (Dark Theme giống thiết kế mẫu) -->
    <div id="toastNotification" class="fixed top-6 right-6 z-50 transform transition-all duration-300 translate-x-[120%] opacity-0 flex items-start p-4 mb-4 text-gray-200 bg-[#1e232d] rounded-xl shadow-[0_8px_30px_rgb(0,0,0,0.2)] border border-gray-700/50 w-[380px]" role="alert">
        <!-- Icon Success (Xanh lá) -->
        <div class="inline-flex items-center justify-center flex-shrink-0 w-8 h-8 rounded-full border-2 border-emerald-500 text-emerald-500 mr-3 mt-0.5">
            <i class="fa-solid fa-check text-sm"></i>
        </div>
        
        <!-- Nội dung -->
        <div class="ml-1 flex-1">
            <h4 class="text-base font-bold text-white mb-0.5">Thêm thành công!</h4>
            <div class="text-sm font-normal text-gray-400">Danh mục mới đã được lưu vào hệ thống.</div>
        </div>
        
        <!-- Nút đóng (X) -->
        <button type="button" onclick="hideNotification()" class="ml-auto -mx-1.5 -my-1.5 bg-transparent text-gray-400 hover:text-white rounded-lg p-1.5 inline-flex items-center justify-center h-8 w-8 transition-colors">
            <i class="fa-solid fa-xmark text-lg"></i>
        </button>
    </div>

    <!-- JAVASCRIPT -->
    <script>
        // Set dữ liệu mẫu cho Textarea khi vừa load trang
        document.addEventListener('DOMContentLoaded', () => {
            const textarea = document.getElementById('categoryDesc');
            textarea.value = "Các loại rau xanh, củ quả sạch đạt chuẩn VietGAP, chứng nhận Organic. Tươi ngon hái mỗi ngày tại vườn.";
            updateCharCount(textarea);
        });

        // Hàm cập nhật số lượng ký tự
        function updateCharCount(element) {
            const maxLength = 500;
            const currentLength = element.value.length;
            const countElement = document.getElementById('charCount');
            
            if (currentLength > maxLength) {
                element.value = element.value.substring(0, maxLength); // Chặn nhập lố
                countElement.innerText = maxLength;
            } else {
                countElement.innerText = currentLength;
            }

            // Đổi màu đỏ nếu sắp hết
            if(currentLength >= 450) {
                countElement.classList.add('text-organic-500');
            } else {
                countElement.classList.remove('text-organic-500');
            }
        }

        // Biến lưu timeout để reset nếu bấm liên tục
        let notificationTimeout;

        // Hàm hiển thị Notification
        function showNotification() {
            const toast = document.getElementById('toastNotification');
            
            // Xóa class ẩn, thêm class hiện
            toast.classList.remove('translate-x-[120%]', 'opacity-0');
            toast.classList.add('translate-x-0', 'opacity-100');

            // Xóa timeout cũ nếu có
            clearTimeout(notificationTimeout);

            // Tự động ẩn sau 3 giây
            notificationTimeout = setTimeout(() => {
                hideNotification();
            }, 3000);
        }

        // Hàm ẩn Notification
        function hideNotification() {
            const toast = document.getElementById('toastNotification');
            toast.classList.remove('translate-x-0', 'opacity-100');
            toast.classList.add('translate-x-[120%]', 'opacity-0');
        }
    </script>
</body>
</html>
