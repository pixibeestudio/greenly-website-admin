<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greenly Add Product Form</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Quicksand', 'sans-serif'],
                    },
                    colors: {
                        forest: {
                            50: '#e8f5e9',
                            100: '#c8e6c9',
                            500: '#4caf50',
                            600: '#43a047',
                            700: '#2e7d32', 
                            800: '#1b5e20',
                            900: '#0d3b10',
                        },
                        organic: {
                            100: '#fff9c4',
                            400: '#fbc02d',
                            500: '#f9a825', 
                        },
                        cream: {
                            50: '#fffde7', 
                            100: '#f5f5f5',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Custom Scrollbar for Textarea */
        textarea::-webkit-scrollbar { width: 6px; }
        textarea::-webkit-scrollbar-track { background: transparent; }
        textarea::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        textarea::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* Hide number input arrows */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
    </style>
</head>
<body class="bg-white font-sans antialiased text-gray-800 p-6 md:p-10 min-h-screen relative overflow-x-hidden">

    <!-- Giả lập Main Content Container -->
    <div class="max-w-[1280px] mx-auto bg-cream-50 p-6 md:p-10 rounded-2xl border border-dashed border-gray-300 relative">
        <div class="absolute -top-3 left-6 bg-white px-3 py-0.5 rounded-full text-xs text-gray-400 font-mono shadow-sm">Add Product Form</div>

        <!-- Header -->
        <div class="mb-8">
            <h2 class="text-2xl font-bold text-forest-800 flex items-center gap-2">
                <button class="w-8 h-8 rounded-full bg-white border border-gray-200 flex items-center justify-center text-gray-500 hover:text-forest-700 hover:bg-forest-50 transition-colors mr-2">
                    <i class="fa-solid fa-arrow-left text-sm"></i>
                </button>
                Thêm sản phẩm mới
            </h2>
            <p class="text-gray-500 text-sm mt-1 ml-11">Cập nhật thông tin chi tiết, hình ảnh và phân loại để đăng bán sản phẩm.</p>
        </div>

        <!-- FORM CARD -->
        <div class="bg-white max-w-6xl mx-auto rounded-3xl shadow-lg shadow-gray-200/50 border border-gray-100 p-8 md:p-10">
            
            <div class="flex flex-col lg:flex-row gap-10">
                
                <!-- ================= CỘT TRÁI: HÌNH ẢNH ================= -->
                <div class="w-full lg:w-1/3 flex flex-col">
                    
                    <!-- 1. Ảnh đại diện chính (Main Thumbnail) -->
                    <div class="mb-6">
                        <div class="w-full flex justify-between items-end mb-2">
                            <label class="block text-sm font-bold text-gray-700">Ảnh đại diện <span class="text-red-500">*</span></label>
                        </div>
                        <div class="w-full aspect-square bg-gray-50 rounded-2xl border-2 border-dashed border-gray-300 flex flex-col items-center justify-center relative overflow-hidden group cursor-pointer hover:border-forest-500 hover:bg-forest-50 transition-colors">
                            <img src="https://images.unsplash.com/photo-1592924357228-91a4daadcfea?auto=format&fit=crop&w=400&q=80" alt="Main Preview" class="absolute inset-0 w-full h-full object-cover z-0">
                            <div class="absolute inset-0 bg-black/40 flex flex-col items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity z-10">
                                <i class="fa-solid fa-cloud-arrow-up text-3xl text-white mb-2"></i>
                                <span class="text-white text-sm font-medium">Tải ảnh khác</span>
                            </div>
                        </div>
                    </div>

                    <hr class="border-gray-100 mb-6">

                    <!-- 2. Thư viện ảnh (Gallery - Max 10) -->
                    <div>
                        <div class="w-full flex justify-between items-end mb-2">
                            <label class="block text-sm font-bold text-gray-700">Hình ảnh chi tiết</label>
                            <span id="galleryCount" class="text-xs text-gray-400 font-medium">3/10</span>
                        </div>
                        <p class="text-[11px] text-gray-400 mb-3">PNG, JPG, WEBP. Tối đa 2MB/ảnh.</p>
                        
                        <!-- Grid Gallery -->
                        <div class="grid grid-cols-3 sm:grid-cols-4 gap-3" id="galleryGrid">
                            <!-- Nút Thêm Ảnh (+) -->
                            <div class="aspect-square bg-gray-50 rounded-xl border border-dashed border-gray-300 flex flex-col items-center justify-center text-gray-400 cursor-pointer hover:border-forest-500 hover:text-forest-600 hover:bg-forest-50 transition-colors">
                                <i class="fa-solid fa-plus text-xl"></i>
                            </div>

                            <!-- Ảnh mẫu 1 -->
                            <div class="aspect-square rounded-xl border border-gray-200 relative group overflow-hidden bg-white shadow-sm" id="img-mock-1">
                                <img src="https://images.unsplash.com/photo-1582284540020-8acbe03f4924?auto=format&fit=crop&w=150&q=80" class="w-full h-full object-cover" alt="Detail">
                                <button onclick="removeImage('img-mock-1')" class="absolute top-1 right-1 w-5 h-5 bg-white/90 hover:bg-red-500 hover:text-white text-gray-600 rounded-full flex items-center justify-center text-[10px] backdrop-blur-sm transition-colors shadow-sm opacity-0 group-hover:opacity-100">
                                    <i class="fa-solid fa-xmark"></i>
                                </button>
                            </div>

                            <!-- Ảnh mẫu 2 -->
                            <div class="aspect-square rounded-xl border border-gray-200 relative group overflow-hidden bg-white shadow-sm" id="img-mock-2">
                                <img src="https://images.unsplash.com/photo-1596484552993-9c861a5b871c?auto=format&fit=crop&w=150&q=80" class="w-full h-full object-cover" alt="Detail">
                                <button onclick="removeImage('img-mock-2')" class="absolute top-1 right-1 w-5 h-5 bg-white/90 hover:bg-red-500 hover:text-white text-gray-600 rounded-full flex items-center justify-center text-[10px] backdrop-blur-sm transition-colors shadow-sm opacity-0 group-hover:opacity-100">
                                    <i class="fa-solid fa-xmark"></i>
                                </button>
                            </div>

                             <!-- Ảnh mẫu 3 -->
                             <div class="aspect-square rounded-xl border border-gray-200 relative group overflow-hidden bg-white shadow-sm" id="img-mock-3">
                                <img src="https://images.unsplash.com/photo-1524179091875-bf99a9a6af57?auto=format&fit=crop&w=150&q=80" class="w-full h-full object-cover" alt="Detail">
                                <button onclick="removeImage('img-mock-3')" class="absolute top-1 right-1 w-5 h-5 bg-white/90 hover:bg-red-500 hover:text-white text-gray-600 rounded-full flex items-center justify-center text-[10px] backdrop-blur-sm transition-colors shadow-sm opacity-0 group-hover:opacity-100">
                                    <i class="fa-solid fa-xmark"></i>
                                </button>
                            </div>
                        </div>
                    </div>

                </div>

                <!-- ================= CỘT PHẢI: FORM NHẬP LIỆU ================= -->
                <div class="w-full lg:w-2/3 flex flex-col justify-between">
                    
                    <div class="space-y-6">
                        
                        <!-- Dòng 1: Tên Sản Phẩm -->
                        <div>
                            <label for="productName" class="block text-sm font-bold text-gray-700 mb-2">Tên sản phẩm <span class="text-red-500">*</span></label>
                            <input type="text" id="productName" value="Cà chua Organic Đà Lạt" oninput="generateSlug(this.value)" class="w-full bg-white border border-gray-300 text-gray-800 text-base rounded-xl focus:ring-2 focus:ring-forest-500 focus:border-forest-500 block px-4 py-3 outline-none transition-all shadow-sm" placeholder="VD: Cà chua Organic Đà Lạt...">
                        </div>

                        <!-- Dòng 2: Danh mục (ID & Select) -->
                        <div class="flex flex-col sm:flex-row gap-4">
                            <!-- Input ID Danh mục -->
                            <div class="w-full sm:w-1/3 relative">
                                <label for="categoryId" class="block text-sm font-bold text-gray-700 mb-2">ID Danh mục <span class="text-red-500">*</span></label>
                                <div class="relative">
                                    <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-gray-400 text-sm font-mono">#</span>
                                    <input type="number" id="categoryId" value="1" class="w-full bg-white border border-gray-300 text-gray-800 text-base font-mono rounded-xl focus:ring-2 focus:ring-forest-500 focus:border-forest-500 block pl-8 pr-4 py-3 outline-none transition-all shadow-sm" placeholder="ID">
                                </div>
                            </div>

                            <!-- Select Danh mục -->
                            <div class="w-full sm:w-2/3">
                                <label for="categorySelect" class="block text-sm font-bold text-gray-700 mb-2">Chọn Danh mục tương ứng</label>
                                <div class="relative">
                                    <select id="categorySelect" class="w-full bg-white border border-gray-300 text-gray-800 text-base rounded-xl focus:ring-2 focus:ring-forest-500 focus:border-forest-500 block px-4 py-3 outline-none transition-all shadow-sm appearance-none cursor-pointer">
                                        <option value="1" selected>Rau Củ Hữu Cơ</option>
                                        <option value="2">Trái Cây Tươi</option>
                                        <option value="3">Thịt & Hải Sản</option>
                                        <option value="4">Đồ Khô & Các Hạt</option>
                                        <option value="5">Sữa & Đồ Uống</option>
                                    </select>
                                    <i class="fa-solid fa-chevron-down absolute right-4 top-1/2 transform -translate-y-1/2 text-gray-400 pointer-events-none text-sm"></i>
                                </div>
                            </div>
                        </div>

                        <!-- Dòng 3: Slug -->
                        <div>
                            <div class="flex justify-between items-end mb-2">
                                <label for="productSlug" class="block text-sm font-bold text-gray-700">Đường dẫn tĩnh (Slug)</label>
                                <span class="text-[10px] text-organic-500 bg-organic-50 px-2 py-0.5 rounded font-bold border border-organic-100"><i class="fa-solid fa-wand-magic-sparkles mr-1"></i>Tự động tạo</span>
                            </div>
                            <div class="relative flex items-center bg-gray-50 border border-gray-300 rounded-xl overflow-hidden focus-within:border-forest-500 focus-within:ring-2 focus-within:ring-forest-500 transition-all shadow-sm">
                                <span class="pl-4 pr-2 text-gray-400 text-sm">greenly.com/</span>
                                <input type="text" id="productSlug" value="ca-chua-organic-da-lat" class="w-full bg-transparent text-gray-700 text-base py-3 pr-4 outline-none font-mono text-sm" placeholder="tu-dong-tao-tu-ten-san-pham">
                            </div>
                        </div>

                        <!-- Dòng 4: Giá & Giá Khuyến mãi -->
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <!-- Giá gốc -->
                            <div>
                                <label for="productPrice" class="block text-sm font-bold text-gray-700 mb-2">Giá gốc (Price) <span class="text-red-500">*</span></label>
                                <div class="relative">
                                    <input type="text" id="productPrice" value="45,000" class="w-full bg-white border border-gray-300 text-gray-800 text-base rounded-xl focus:ring-2 focus:ring-forest-500 focus:border-forest-500 block pl-4 pr-12 py-3 outline-none transition-all shadow-sm font-mono text-right" placeholder="0.00">
                                    <span class="absolute right-4 top-1/2 transform -translate-y-1/2 text-gray-500 font-bold text-sm pointer-events-none">₫</span>
                                </div>
                            </div>

                            <!-- Giá Khuyến mãi -->
                            <div>
                                <label for="discountPrice" class="block text-sm font-bold text-gray-700 mb-2">Giá Khuyến mãi (Tùy chọn)</label>
                                <div class="relative">
                                    <input type="text" id="discountPrice" value="0.00" class="w-full bg-white border border-gray-300 text-gray-800 text-base rounded-xl focus:ring-2 focus:ring-organic-500 focus:border-organic-500 block pl-4 pr-12 py-3 outline-none transition-all shadow-sm font-mono text-right text-organic-600" placeholder="0.00">
                                    <span class="absolute right-4 top-1/2 transform -translate-y-1/2 text-gray-500 font-bold text-sm pointer-events-none">₫</span>
                                </div>
                            </div>
                        </div>

                        <!-- Dòng 5: Đơn vị & Nguồn gốc -->
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <!-- Unit -->
                            <div>
                                <label for="productUnit" class="block text-sm font-bold text-gray-700 mb-2">Đơn vị tính (Unit) <span class="text-red-500">*</span></label>
                                <div class="relative">
                                    <select id="productUnit" class="w-full bg-white border border-gray-300 text-gray-800 text-base rounded-xl focus:ring-2 focus:ring-forest-500 focus:border-forest-500 block px-4 py-3 outline-none transition-all shadow-sm appearance-none cursor-pointer">
                                        <option value="Kg" selected>Kilogram (Kg)</option>
                                        <option value="Gram">Gram (g)</option>
                                        <option value="Hộp">Hộp / Khay</option>
                                        <option value="Túi">Túi / Bịch</option>
                                        <option value="Bó">Bó / Lốc</option>
                                    </select>
                                    <i class="fa-solid fa-chevron-down absolute right-4 top-1/2 transform -translate-y-1/2 text-gray-400 pointer-events-none text-sm"></i>
                                </div>
                            </div>

                            <!-- Origin -->
                            <div>
                                <label for="productOrigin" class="block text-sm font-bold text-gray-700 mb-2">Xuất xứ (Origin)</label>
                                <div class="relative">
                                    <i class="fa-solid fa-location-dot absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400 text-sm"></i>
                                    <input type="text" id="productOrigin" value="Đà Lạt, Lâm Đồng" class="w-full bg-white border border-gray-300 text-gray-800 text-base rounded-xl focus:ring-2 focus:ring-forest-500 focus:border-forest-500 block pl-10 pr-4 py-3 outline-none transition-all shadow-sm" placeholder="VD: Đà Lạt, Nhật Bản...">
                                </div>
                            </div>
                        </div>

                        <!-- Dòng 6: Textarea Mô tả -->
                        <div>
                            <div class="flex justify-between items-end mb-2">
                                <label for="productDesc" class="block text-sm font-bold text-gray-700">Mô tả sản phẩm</label>
                            </div>
                            <div class="relative">
                                <textarea id="productDesc" rows="4" class="w-full bg-white border border-gray-300 text-gray-800 text-base rounded-xl focus:ring-2 focus:ring-forest-500 focus:border-forest-500 block px-4 py-3 pb-8 outline-none transition-all shadow-sm resize-y" placeholder="Nhập mô tả chi tiết về sản phẩm, công dụng, cách bảo quản..." oninput="updateCharCount(this)"></textarea>
                                
                                <!-- Character Count -->
                                <div class="absolute bottom-2 right-4 text-xs font-medium text-gray-400 bg-white px-1">
                                    <span id="charCount">0</span>/2000
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- ================= BUTTONS ================= -->
                    <div class="flex justify-end items-center gap-4 mt-8 pt-6 border-t border-gray-100">
                        <button type="button" class="px-6 py-3 bg-white text-gray-600 border border-gray-200 font-bold rounded-xl hover:bg-gray-50 transition-colors shadow-sm">
                            Hủy
                        </button>
                        <button type="button" onclick="showNotification()" class="px-8 py-3 bg-forest-700 text-white font-bold rounded-xl hover:bg-forest-800 shadow-lg shadow-forest-500/30 transition-all flex items-center gap-2">
                            <i class="fa-solid fa-check"></i> Thêm sản phẩm
                        </button>
                    </div>

                </div>
            </div>

        </div>
    </div>

    <!-- TOAST NOTIFICATION -->
    <div id="toastNotification" class="fixed top-6 right-6 z-50 transform transition-all duration-300 translate-x-[120%] opacity-0 flex items-start p-4 mb-4 text-gray-200 bg-[#1e232d] rounded-xl shadow-[0_8px_30px_rgb(0,0,0,0.2)] border border-gray-700/50 w-[380px]" role="alert">
        <div class="inline-flex items-center justify-center flex-shrink-0 w-8 h-8 rounded-full border-2 border-emerald-500 text-emerald-500 mr-3 mt-0.5">
            <i class="fa-solid fa-check text-sm"></i>
        </div>
        <div class="ml-1 flex-1">
            <h4 class="text-base font-bold text-white mb-0.5">Thêm thành công!</h4>
            <div class="text-sm font-normal text-gray-400">Sản phẩm mới đã được lưu vào hệ thống.</div>
        </div>
        <button type="button" onclick="hideNotification()" class="ml-auto -mx-1.5 -my-1.5 bg-transparent text-gray-400 hover:text-white rounded-lg p-1.5 inline-flex items-center justify-center h-8 w-8 transition-colors">
            <i class="fa-solid fa-xmark text-lg"></i>
        </button>
    </div>

    <!-- JAVASCRIPT LOGIC -->
    <script>
        // --- 1. Lọc Tiếng Việt & Tự động tạo Slug ---
        function removeVietnameseTones(str) {
            str = str.replace(/à|á|ạ|ả|ã|â|ầ|ấ|ậ|ẩ|ẫ|ă|ằ|ắ|ặ|ẳ|ẵ/g, "a");
            str = str.replace(/è|é|ẹ|ẻ|ẽ|ê|ề|ế|ệ|ể|ễ/g, "e");
            str = str.replace(/ì|í|ị|ỉ|ĩ/g, "i");
            str = str.replace(/ò|ó|ọ|ỏ|õ|ô|ồ|ố|ộ|ổ|ỗ|ơ|ờ|ớ|ợ|ở|ỡ/g, "o");
            str = str.replace(/ù|ú|ụ|ủ|ũ|ư|ừ|ứ|ự|ử|ữ/g, "u");
            str = str.replace(/ỳ|ý|ỵ|ỷ|ỹ/g, "y");
            str = str.replace(/đ/g, "d");
            str = str.replace(/À|Á|Ạ|Ả|Ã|Â|Ầ|Ấ|Ậ|Ẩ|Ẫ|Ă|Ằ|Ắ|Ặ|Ẳ|Ẵ/g, "A");
            str = str.replace(/È|É|Ẹ|Ẻ|Ẽ|Ê|Ề|Ế|Ệ|Ể|Ễ/g, "E");
            str = str.replace(/Ì|Í|Ị|Ỉ|Ĩ/g, "I");
            str = str.replace(/Ò|Ó|Ọ|Ỏ|Õ|Ô|Ồ|Ố|Ộ|Ổ|Ỗ|Ơ|Ờ|Ớ|Ợ|Ở|Ỡ/g, "O");
            str = str.replace(/Ù|Ú|Ụ|Ủ|Ũ|Ư|Ừ|Ứ|Ự|Ử|Ữ/g, "U");
            str = str.replace(/Ỳ|Ý|Ỵ|Ỷ|Ỹ/g, "Y");
            str = str.replace(/Đ/g, "D");
            return str;
        }

        function generateSlug(text) {
            let slug = removeVietnameseTones(text).toLowerCase();
            slug = slug.replace(/[^a-z0-9\s-]/g, ''); // Xóa ký tự đặc biệt
            slug = slug.replace(/\s+/g, '-'); // Thay khoảng trắng bằng gạch ngang
            slug = slug.replace(/-+/g, '-'); // Xóa gạch ngang thừa
            document.getElementById('productSlug').value = slug;
        }

        // --- 2. Đồng bộ ID Danh mục và Select Menu ---
        const catIdInput = document.getElementById('categoryId');
        const catSelect = document.getElementById('categorySelect');

        // Khi đổi Select -> Cập nhật Input ID
        catSelect.addEventListener('change', function() {
            catIdInput.value = this.value;
        });

        // Khi nhập Input ID -> Tự động chọn Select (nếu có tồn tại)
        catIdInput.addEventListener('input', function() {
            const val = this.value;
            let exists = false;
            
            // Kiểm tra xem ID nhập vào có trong danh sách Select không
            Array.from(catSelect.options).forEach(option => {
                if(option.value === val) {
                    exists = true;
                }
            });

            if(exists) {
                catSelect.value = val;
            } else {
                catSelect.value = ""; // Reset select nếu ID không hợp lệ
            }
        });

        // --- 3. Đếm ký tự Textarea ---
        document.addEventListener('DOMContentLoaded', () => {
            const textarea = document.getElementById('productDesc');
            textarea.value = "Cà chua được trồng theo phương pháp hữu cơ tại Đà Lạt, đảm bảo không hóa chất, không chất bảo quản. Thích hợp làm salad, nước ép hoặc nấu ăn hàng ngày.";
            updateCharCount(textarea);
        });

        function updateCharCount(element) {
            const maxLength = 2000;
            const currentLength = element.value.length;
            const countElement = document.getElementById('charCount');
            
            if (currentLength > maxLength) {
                element.value = element.value.substring(0, maxLength); 
                countElement.innerText = maxLength;
            } else {
                countElement.innerText = currentLength;
            }

            if(currentLength >= 1900) {
                countElement.classList.add('text-organic-500');
                countElement.classList.remove('text-gray-400');
            } else {
                countElement.classList.remove('text-organic-500');
                countElement.classList.add('text-gray-400');
            }
        }

        // --- 4. Logic UI cho Gallery Ảnh (Xóa ảnh giả lập) ---
        let currentImages = 3; // Số lượng ảnh mẫu ban đầu
        const maxImages = 10;
        
        function removeImage(imgId) {
            const el = document.getElementById(imgId);
            if(el) {
                el.remove();
                currentImages--;
                updateGalleryCount();
            }
        }

        function updateGalleryCount() {
            document.getElementById('galleryCount').innerText = `${currentImages}/${maxImages}`;
        }

        // --- 5. Thông báo (Toast Notification) ---
        let notificationTimeout;

        function showNotification() {
            const toast = document.getElementById('toastNotification');
            toast.classList.remove('translate-x-[120%]', 'opacity-0');
            toast.classList.add('translate-x-0', 'opacity-100');

            clearTimeout(notificationTimeout);
            notificationTimeout = setTimeout(() => {
                hideNotification();
            }, 3000);
        }

        function hideNotification() {
            const toast = document.getElementById('toastNotification');
            toast.classList.remove('translate-x-0', 'opacity-100');
            toast.classList.add('translate-x-[120%]', 'opacity-0');
        }
    </script>
</body>
</html>
